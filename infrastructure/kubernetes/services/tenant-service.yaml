apiVersion: apps/v1
kind: Deployment
metadata:
  name: tenant-service
  namespace: venueiq-services
  labels:
    app: tenant-service
    version: "1.0"
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  selector:
    matchLabels:
      app: tenant-service
  template:
    metadata:
      labels:
        app: tenant-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
    spec:
      containers:
      - name: tenant-service
        image: ACCOUNT.dkr.ecr.us-east-1.amazonaws.com/venueiq-tenant-service:latest
        ports:
        - containerPort: 3001
        env:
        - name: PORT
          value: "3001"
        - name: NODE_ENV
          value: production
        - name: TENANTS_DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: venueiq-db-secrets
              key: TENANTS_DATABASE_URL
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: venueiq-secrets
              key: REDIS_URL
        - name: KAFKA_BROKERS
          valueFrom:
            secretKeyRef:
              name: venueiq-secrets
              key: KAFKA_BROKERS
        - name: CLERK_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: venueiq-secrets
              key: CLERK_SECRET_KEY
        - name: STRIPE_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: venueiq-secrets
              key: STRIPE_SECRET_KEY
        resources:
          requests: { memory: "256Mi", cpu: "100m" }
          limits:   { memory: "512Mi", cpu: "500m" }
        livenessProbe:
          httpGet: { path: /health, port: 3001 }
          initialDelaySeconds: 15
          periodSeconds: 10
        readinessProbe:
          httpGet: { path: /health, port: 3001 }
          initialDelaySeconds: 10
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: tenant-service
  namespace: venueiq-services
spec:
  selector:
    app: tenant-service
  ports:
  - port: 80
    targetPort: 3001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: tenant-service-hpa
  namespace: venueiq-services
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: tenant-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target: { type: Utilization, averageUtilization: 70 }
