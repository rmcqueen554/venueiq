apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: venueiq-ingress
  namespace: venueiq-services
  annotations:
    kubernetes.io/ingress.class: "kong"
    konghq.com/plugins: "rate-limiting,jwt-auth,cors"
    konghq.com/strip-path: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.venueiq.com
    - venueiq.com
    secretName: venueiq-tls
  rules:
  - host: api.venueiq.com
    http:
      paths:
      - path: /api/tenants
        pathType: Prefix
        backend:
          service: { name: tenant-service, port: { number: 80 } }
      - path: /api/executive
        pathType: Prefix
        backend:
          service: { name: executive-service, port: { number: 80 } }
      - path: /api/concessions
        pathType: Prefix
        backend:
          service: { name: concessions-service, port: { number: 80 } }
      - path: /api/security
        pathType: Prefix
        backend:
          service: { name: security-service, port: { number: 80 } }
      - path: /api/parking
        pathType: Prefix
        backend:
          service: { name: parking-service, port: { number: 80 } }
      - path: /api/nlq
        pathType: Prefix
        backend:
          service: { name: nlq-service, port: { number: 80 } }
      - path: /api/agents
        pathType: Prefix
        backend:
          service: { name: agents-service, port: { number: 80 } }
      - path: /webhooks
        pathType: Prefix
        backend:
          service: { name: tenant-service, port: { number: 80 } }
  - host: realtime.venueiq.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service: { name: realtime-service, port: { number: 80 } }
