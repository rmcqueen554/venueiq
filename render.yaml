services:
  # ── Tenant & Onboarding Service ────────────────────────────────────────────
  - type: web
    name: venueiq-tenant
    runtime: node
    region: oregon
    plan: starter
    branch: main
    buildCommand: npm install --legacy-peer-deps --no-fund
    startCommand: npx tsx packages/services/tenant-service/src/index.ts
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: KAFKA_ENABLED
        value: "false"
      - fromGroup: venueiq-shared

