services:
  - type: web
    name: venueiq-api
    runtime: docker
    region: oregon
    plan: free
    branch: main
    rootDir: packages/services/api
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: KAFKA_ENABLED
        value: "false"
      # DATABASE_URL, CLERK_SECRET_KEY, ANTHROPIC_API_KEY set via Render dashboard
