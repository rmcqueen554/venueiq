services:
  - type: web
    name: venueiq-api
    runtime: node
    region: oregon
    plan: free
    branch: main
    rootDir: packages/services/api
    buildCommand: npm install --legacy-peer-deps --no-fund --no-package-lock && npx prisma generate
    startCommand: npx tsx src/index.ts
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: KAFKA_ENABLED
        value: "false"
      # Sensitive vars (DATABASE_URL, CLERK_SECRET_KEY, ANTHROPIC_API_KEY, etc.)
      # are set directly on the Render service via dashboard or API — not stored here.
